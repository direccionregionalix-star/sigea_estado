        let auditoria = {}; // Objeto para almacenar clics y correcciones

        function initApp() {
            // 1. Población del filtro de comunas usando el diccionario
            const comunasPresentes = new Set(datos.map(d => d.Comuna));
            const selectComuna = document.getElementById('filtro-comuna');
            
            // Ordenamos alfabéticamente por nombre de comuna
            const comunasOrdenadas = Array.from(comunasPresentes)
                .map(cut => ({ cut: cut, nombre: dicComunas[cut] || cut }))
                .sort((a, b) => a.nombre.localeCompare(b.nombre));

            comunasOrdenadas.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.cut;
                opt.textContent = c.nombre;
                selectComuna.appendChild(opt);
            });

            // 2. Render inicial de la tabla
            renderTabla();
        }

        function getBadgeClass(estado) {
            if (estado.includes('Migrado')) return 'badge-migrado badge rounded-pill';
            if (estado.includes('QA')) return 'badge-qa badge rounded-pill';
            if (estado.includes('Trabajo')) return 'badge-trabajo badge rounded-pill';
            return 'badge-pendiente badge rounded-pill';
        }

        function renderTabla() {
            const tbody = document.getElementById('tbody-recintos');
            const filtroTexto = document.getElementById('buscador').value.toLowerCase();
            const filtroComuna = document.getElementById('filtro-comuna').value;
            const filtroEstado = document.getElementById('filtro-estado').value.toLowerCase();
            tbody.innerHTML = '';

            datos.forEach(r => {
                const nombreComuna = dicComunas[r.Comuna] || r.Comuna;
                
                // Filtros
                const textoBuscable = `${r.Codigo} ${r.Nombre.toLowerCase()} ${nombreComuna.toLowerCase()} ${r.Funcionario_Actual.toLowerCase()}`;
                if (filtroTexto && !textoBuscable.includes(filtroTexto)) return;
                if (filtroComuna && r.Comuna !== filtroComuna) return;
                if (filtroEstado && !r.Estado_Operativo.toLowerCase().includes(filtroEstado)) return;

                const tr = document.createElement('tr');
                tr.id = `row-${r.Codigo}`;
                
                // Alertas de reserva territorial
                let infoExtra = '';
                if (nombreComuna === 'Temuco') {
                    infoExtra = `<br><span class="reserva-badge" title="Jurisdicción de smardones">📌 Reservado (smardones)</span>`;
                }

                // Generación de botones o estado de auditoría
                let accionesHtml = '';
                if (auditoria[r.Codigo]) {
                    if (auditoria[r.Codigo].accion === 'reclamado') {
                        tr.classList.add('row-modificada');
                        accionesHtml = `<strong>✅ Reclamado por: ${auditoria[r.Codigo].usuario}</strong> <br><button class="btn btn-sm btn-link text-danger p-0" onclick="deshacer('${r.Codigo}')">Deshacer</button>`;
                    } else {
                        tr.classList.add('row-descartada');
                        accionesHtml = `<strong>🚫 Descartado: ${auditoria[r.Codigo].motivo}</strong> <br><button class="btn btn-sm btn-link text-danger p-0" onclick="deshacer('${r.Codigo}')">Deshacer</button>`;
                    }
                } else {
                    accionesHtml = `
                        <button class="btn btn-sm btn-outline-success me-1 mb-1" onclick="reclamar('${r.Codigo}', '${r.Nombre.replace(/'/g, "")}')">🙋‍♂️ Fui yo</button>
                        <button class="btn btn-sm btn-outline-danger mb-1" onclick="descartar('${r.Codigo}', '${r.Nombre.replace(/'/g, "")}')">🚫 Descartar</button>
                    `;
                }

                tr.innerHTML = `
                    <td><strong>${r.Codigo}</strong></td>
                    <td>${nombreComuna}</td>
                    <td>${r.Nombre} ${infoExtra} <br><small class="text-muted">Estado sistema: ${r.Funcionario_Actual}</small></td>
                    <td>${r.Total_Electores}</td>
                    <td><span class="${getBadgeClass(r.Estado_Operativo)}">${r.Estado_Operativo}</span></td>
                    <td style="min-width: 220px;">${accionesHtml}</td>
                `;
                tbody.appendChild(tr);
            });
            actualizarPanel();
        }

        function reclamar(codigo, nombre) {
            const usuario = prompt(`¿Quién rectificó el recinto ${codigo} - ${nombre}?\n(Ingresa tu cuenta de usuario, ej: jmedina)`);
            if (usuario && usuario.trim() !== '') {
                auditoria[codigo] = { accion: 'reclamado', usuario: usuario.trim(), nombre: nombre };
                renderTabla();
            }
        }

        function descartar(codigo, nombre) {
            if(confirm(`Estás marcando el recinto ${codigo} para excluirlo de la rectificación.\n¿Continuar?`)) {
                const motivo = prompt('Por favor, indica un motivo breve (Ej: Local fusionado, Inhabilitado, etc):');
                if (motivo && motivo.trim() !== '') {
                    auditoria[codigo] = { accion: 'descartado', motivo: motivo.trim(), nombre: nombre };
                    renderTabla();
                }
            }
        }

        function deshacer(codigo) {
            delete auditoria[codigo];
            renderTabla();
        }

        function actualizarPanel() {
            const count = Object.keys(auditoria).length;
            const panel = document.getElementById('panel-envio');
            document.getElementById('contador-modificados').innerText = `${count} recinto(s) auditado(s) en esta sesión`;
            panel.style.display = count > 0 ? 'flex' : 'none';
        }

        function copiarReporte() {
            let texto = "📊 *REPORTE DE AUDITORÍA SIGEA (TERRENO)*\n\n";
            Object.keys(auditoria).forEach(cod => {
                const d = auditoria[cod];
                if (d.accion === 'reclamado') {
                    texto += `✅ *${cod}* (${d.nombre})\n   🙋‍♂️ Reclamado por: ${d.usuario}\n\n`;
                } else {
                    texto += `🚫 *${cod}* (${d.nombre})\n   ⛔ DESCARTAR: ${d.motivo}\n\n`;
                }
            });
            
            navigator.clipboard.writeText(texto).then(() => {
                alert("¡Reporte copiado al portapapeles!\n\nAbre WhatsApp Web o tu correo y pega el texto para enviarlo al Administrador.");
            }).catch(err => {
                alert("Error al copiar automáticamente. Selecciona el texto siguiente:\n\n" + texto);
            });
        }

        // Listeners de los filtros
        document.getElementById('buscador').addEventListener('input', renderTabla);
        document.getElementById('filtro-comuna').addEventListener('change', renderTabla);
        document.getElementById('filtro-estado').addEventListener('change', renderTabla);

        // Inicializar la app
        window.onload = initApp;
    </script>
